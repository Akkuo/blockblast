<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Concept Prototype</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a; /* 深色底，防閃爍 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            height: 100vh;
            max-height: 100vh;
            max-width: 100vw;
            aspect-ratio: 1080 / 2340;
            position: relative;
            overflow: hidden;
            background-color: #000; /* 全權交給 PixiJS 繪製背景 */
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 30px;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            color: #1e3c72;
            font-weight: bold;
            font-size: 40px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
        }
        #mute-btn {
            background: none;
            border: none;
            font-size: 50px;
            cursor: pointer;
            color: #1e3c72;
            filter: drop-shadow(2px 2px 4px rgba(255,255,255,0.8));
            pointer-events: auto;
        }
        #game-over-modal {
            pointer-events: auto;
        }

        .modal-content {
            background: url('./assets/118_blockblast_panel_pop.png') no-repeat center center;
            background-size: 100% 100%;
            width: 850px;
            height: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .result-title {
            position: absolute;
            top: -100px;
            width: 800px;
        }

        .score-box {
            margin-top: 200px;
            font-size: 70px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.1;
        }

        .best-score-box {
            margin-top: 80px;
            font-size: 50px;
            color: #ffd15b;
            font-weight: bold;
            text-shadow: 0px 4px 8px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .replay-btn {
            margin-top: auto;
            margin-bottom: 100px;
            background: url('./assets/118_blockblast_icon_replay.png') no-repeat center center;
            background-size: contain;
            width: 250px;
            height: 250px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .replay-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div class="header" style="justify-content: flex-end;">
                <button id="mute-btn">🔊</button>
            </div>
        </div>
        
        <!-- Game Over Settlement Screen -->
        <div id="game-over-modal" style="display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); z-index: 100; flex-direction: column; justify-content: center; align-items: center;">
            <div class="modal-content">
                <img src="./assets/118_blockblast_panel_title_result_1.png" class="result-title">
                
                <div class="score-box">
                    SCORE
                    <span id="final-score" style="font-size: 150px; color: #5bff8c;">0</span>
                </div>
                
                <div class="best-score-box">
                    <img src="./assets/118_blockblast_img_crown_result.png" width="80">
                    BEST: <span id="best-score">0</span>
                </div>
                
                <button id="restart-btn" class="replay-btn"></button>
            </div>
        </div>
    </div>
    <!-- 引入 PixiJS 8 -->
    <script src="https://pixijs.download/v8.0.0/pixi.min.js"></script>
    <script type="module" src="./src/main.js"></script>
</body>
</html>
